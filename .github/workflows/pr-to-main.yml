name: PR → Main (prod)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  ci:
    name: Install, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install lambda dependencies
        run: |
          for dir in project/lambdas/*/; do
            pip install -q -r "$dir/requirements.txt"
          done

      - name: Install dev dependencies
        run: pip install -q -r project/requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest project/tests/ -v --tb=short -m "not e2e"

  tf-plan-prod:
    name: Terraform plan (prod)
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      pull-requests: write
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Terraform init
        run: |
          cd terraform
          terraform init -backend-config="key=prod/terraform.tfstate"

      - name: Terraform plan
        id: plan
        run: |
          cd terraform
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color \
            -out=tfplan 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');

            const summary = plan.match(/Plan: .+?\./)?.[0]
              ?? plan.match(/No changes\..+/)?.[0]
              ?? 'Could not parse plan summary';

            const dangerous = plan.split('\n')
              .filter(l => /^\s*(~|-)/.test(l) || l.includes('must be replaced') || l.includes('forces replacement'))
              .slice(0, 20).join('\n');

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '### Terraform Plan — prod',
              '',
              '> ⚠️ **Production — review carefully before approving.**',
              '',
              `**${summary}**`,
              dangerous ? `\n⚠️ Modifications / replacements:\n\`\`\`diff\n${dangerous}\n\`\`\`` : '',
              '',
              `[View full plan →](${runUrl})`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
