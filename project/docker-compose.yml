version: "3.9"

networks:
  racetrack:
    name: racetrack

services:
  localstack:
    image: localstack/localstack:3
    networks:
      - racetrack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,events,lambda,iam
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # Attach Lambda containers to the same network so they can reach postgres
      - LAMBDA_DOCKER_NETWORK=racetrack
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    networks:
      - racetrack
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: racetrack
      POSTGRES_USER: racetrack
      POSTGRES_PASSWORD: racetrack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racetrack"]
      interval: 10s
      timeout: 5s
      retries: 5
