networks:
  racetrack:
    name: racetrack

services:
  localstack:
    image: localstack/localstack:3
    networks:
      - racetrack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,events,lambda,iam,dynamodb
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # Attach Lambda containers to the same network so they can reach postgres
      - LAMBDA_DOCKER_NETWORK=racetrack
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    networks:
      - racetrack
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: racetrack
      POSTGRES_USER: racetrack
      POSTGRES_PASSWORD: racetrack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racetrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability tail: metrics-exporter -> prometheus -> grafana ──────────
  # metrics-exporter reads simulation buckets from DynamoDB (LocalStack) and
  # serves Prometheus gauges on :9100. To see live data, run the full pipeline
  # so f1-consumer populates the racetrack-local-simulation-metrics table.
  metrics-exporter:
    build: ./containers/metrics_exporter
    networks:
      - racetrack
    ports:
      - "9100:9100"
    environment:
      - DYNAMODB_TABLE=racetrack-local-simulation-metrics
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - METRICS_PORT=9100
      - REFRESH_SECONDS=5
    depends_on:
      localstack:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    networks:
      - racetrack
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:11.2.0
    networks:
      - racetrack
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
