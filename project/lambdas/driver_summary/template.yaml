AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: driver_summary — resumen de piloto (RaceTrack)

Globals:
  Function:
    Runtime: python3.9
    Timeout: 30
    MemorySize: 256
  HttpApi:
    CorsConfiguration:
      AllowMethods:
        - GET
        - OPTIONS
      AllowHeaders:
        - Content-Type
      AllowOrigins:
        - "*"

Resources:
  DriverSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Events:
        DriverSummary:
          Type: HttpApi
          Properties:
            Path: /driver-summary
            Method: GET

Outputs:
  ApiEndpoint:
    Description: "Base URL — use /driver-summary"
    Value: !GetAtt ServerlessHttpApi.ApiEndpoint
  DriverSummaryFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt DriverSummaryFunction.Arn
