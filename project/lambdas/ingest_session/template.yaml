# Individual function definition (for reference only).
# The API Gateway and deployment are managed by project/template.yaml.
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ingest_session — bulk fetch from OpenF1, save to S3, fire EventBridge

Globals:
  Function:
    Runtime: python3.9
    Timeout: 60
    MemorySize: 256

Resources:
  SessionsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: racetrack-sessions

  IngestSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref SessionsBucket
          S3_ENDPOINT: ""
          EVENTS_ENDPOINT: ""
          AWS_DEFAULT_REGION: !Ref AWS::Region
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SessionsBucket
        - EventBridgePutEventsPolicy:
            EventBusName: default
