AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: list_drivers — returns drivers for a session from RDS

Globals:
  Function:
    Runtime: python3.9
    Timeout: 30
    MemorySize: 256
  HttpApi:
    CorsConfiguration:
      AllowMethods:
        - GET
        - OPTIONS
      AllowHeaders:
        - Content-Type
      AllowOrigins:
        - "*"

Parameters:
  DbHost:
    Type: String
    Default: localhost
  DbPort:
    Type: String
    Default: "5432"
  DbName:
    Type: String
    Default: racetrack
  DbUser:
    Type: String
    Default: racetrack
  DbPassword:
    Type: String
    NoEcho: true
    Default: racetrack

Resources:
  F1DriversApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      Events:
        GetDrivers:
          Type: HttpApi
          Properties:
            Path: /drivers
            Method: GET

Outputs:
  ApiEndpoint:
    Description: "Base URL — use GET /drivers?session_key=..."
    Value: !GetAtt ServerlessHttpApi.ApiEndpoint
  F1DriversApiFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt F1DriversApiFunction.Arn
