AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: save_session — EventBridge trigger, parse S3 payload and persist to RDS

Globals:
  Function:
    Runtime: python3.9
    Timeout: 60
    MemorySize: 512

Parameters:
  DbHost:
    Type: String
    Default: localhost
  DbPort:
    Type: String
    Default: "5432"
  DbName:
    Type: String
    Default: racetrack
  DbUser:
    Type: String
    Default: racetrack
  DbPassword:
    Type: String
    NoEcho: true
    Default: racetrack
  S3BucketName:
    Type: String
    Default: racetrack-sessions

Resources:
  SaveSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Environment:
        Variables:
          S3_ENDPOINT: ""
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref S3BucketName
      Events:
        SessionIngested:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - racetrack
              detail-type:
                - SessionIngested

Outputs:
  SaveSessionFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt SaveSessionFunction.Arn
