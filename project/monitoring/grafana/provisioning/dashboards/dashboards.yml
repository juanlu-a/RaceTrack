# Load every dashboard JSON under /var/lib/grafana/dashboards on startup.
apiVersion: 1

providers:
  - name: RaceTrack
    orgId: 1
    folder: RaceTrack
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
