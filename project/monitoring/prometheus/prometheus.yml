# Prometheus scrape config for the RaceTrack telemetry stack.
#
# The target "metrics-exporter:9100" resolves both locally (docker-compose
# service name) and in AWS (ECS Service Connect discovery name), so this one
# file works for the local stack and the gated prod stack alike.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: f1-metrics-exporter
    static_configs:
      - targets: ["metrics-exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
