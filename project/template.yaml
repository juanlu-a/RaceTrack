AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  RaceTrack — Equipo 8
  Unified F1 data pipeline: one API Gateway, S3, EventBridge, and PostgreSQL (RDS).

Globals:
  Function:
    Runtime: python3.9
    Timeout: 60
    MemorySize: 256
  HttpApi:
    CorsConfiguration:
      AllowMethods:
        - GET
        - OPTIONS
      AllowHeaders:
        - Content-Type
      AllowOrigins:
        - "*"

Parameters:
  DbHost:
    Type: String
    Default: localhost
  DbPort:
    Type: String
    Default: "5432"
  DbName:
    Type: String
    Default: racetrack
  DbUser:
    Type: String
    Default: racetrack
  DbPassword:
    Type: String
    NoEcho: true
    Default: racetrack
  S3BucketName:
    Type: String
    Default: racetrack-sessions
  S3Endpoint:
    Type: String
    Default: ""
  EventsEndpoint:
    Type: String
    Default: ""

Resources:

  # ── Shared API Gateway ────────────────────────────────────────────────────
  RaceTrackApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type
        AllowOrigins:
          - "*"

  # ── S3 bucket for raw ingestion payloads ─────────────────────────────────
  SessionsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  # ── Step 1a: Ingest session (thin HTTP entrypoint) ────────────────────────
  # GET /ingest?session_key=...
  # Validates the request, fires an EventBridge `IngestRequested` event and
  # returns 202 immediately. The heavy OpenF1 fetch happens asynchronously in
  # IngestWorkerFunction (no API Gateway 30s timeout).
  IngestSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: lambdas/ingest_session/
      Environment:
        Variables:
          EVENTS_ENDPOINT: !Ref EventsEndpoint
          AWS_DEFAULT_REGION: !Ref AWS::Region
      Policies:
        - EventBridgePutEventsPolicy:
            EventBusName: default
      Events:
        IngestSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref RaceTrackApi
            Path: /ingest
            Method: GET

  # ── Step 1b: Ingest worker (heavy, async) ─────────────────────────────────
  # Triggered by EventBridge (IngestRequested). Fetches everything from OpenF1
  # (session, drivers, laps, position, telemetry), saves the bundle to S3, then
  # fires SessionIngested so SaveSessionFunction persists to RDS.
  IngestWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: lambdas/ingest_worker/
      Timeout: 900
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref SessionsBucket
          S3_ENDPOINT: !Ref S3Endpoint
          EVENTS_ENDPOINT: !Ref EventsEndpoint
          AWS_DEFAULT_REGION: !Ref AWS::Region
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref SessionsBucket
        - EventBridgePutEventsPolicy:
            EventBusName: default
      Events:
        IngestRequested:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - racetrack
              detail-type:
                - IngestRequested

  # ── Step 1c: Save session to RDS ─────────────────────────────────────────
  # Triggered by EventBridge (SessionIngested).
  # Reads the raw JSON from S3 and upserts sessions/drivers/laps into PostgreSQL.
  SaveSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: lambdas/save_session/
      Environment:
        Variables:
          S3_ENDPOINT: !Ref S3Endpoint
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref SessionsBucket
      Events:
        SessionIngested:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - racetrack
              detail-type:
                - SessionIngested

  # ── Step 2: List available sessions ──────────────────────────────────────
  # GET /sessions  or  GET /sessions?year=2024
  ListSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: lambdas/list_session/
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      Events:
        ListSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref RaceTrackApi
            Path: /sessions
            Method: GET

  # ── Step 3: List drivers in a session ────────────────────────────────────
  # GET /drivers?session_key=...
  ListDriversFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: lambdas/list_drivers/
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      Events:
        ListDrivers:
          Type: HttpApi
          Properties:
            ApiId: !Ref RaceTrackApi
            Path: /drivers
            Method: GET

  # ── Step 4: Driver summary (lap statistics) ───────────────────────────────
  # GET /driver-summary?session_key=...&driver_number=...
  DriverSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: lambdas/driver_summary/
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      Events:
        DriverSummary:
          Type: HttpApi
          Properties:
            ApiId: !Ref RaceTrackApi
            Path: /driver-summary
            Method: GET

  # ── Step 5: Driver laps ───────────────────────────────────────────────────
  # GET /driver-laps?session_key=...&driver_number=...
  DriverLapsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: lambdas/driver_laps/
      Environment:
        Variables:
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      Events:
        DriverLaps:
          Type: HttpApi
          Properties:
            ApiId: !Ref RaceTrackApi
            Path: /driver-laps
            Method: GET

Outputs:
  ApiEndpoint:
    Description: "Single API Gateway base URL"
    Value: !GetAtt RaceTrackApi.ApiEndpoint
  IngestEndpoint:
    Description: "Step 1 — GET /ingest?session_key=..."
    Value: !Sub "${RaceTrackApi.ApiEndpoint}/ingest"
  ListSessionsEndpoint:
    Description: "Step 2 — GET /sessions[?year=...]"
    Value: !Sub "${RaceTrackApi.ApiEndpoint}/sessions"
  ListDriversEndpoint:
    Description: "Step 3 — GET /drivers?session_key=..."
    Value: !Sub "${RaceTrackApi.ApiEndpoint}/drivers"
  DriverSummaryEndpoint:
    Description: "Step 4 — GET /driver-summary?session_key=...&driver_number=..."
    Value: !Sub "${RaceTrackApi.ApiEndpoint}/driver-summary"
  DriverLapsEndpoint:
    Description: "Step 5 — GET /driver-laps?session_key=...&driver_number=..."
    Value: !Sub "${RaceTrackApi.ApiEndpoint}/driver-laps"
  SessionsBucketName:
    Description: "S3 bucket for raw session payloads"
    Value: !Ref SessionsBucket
